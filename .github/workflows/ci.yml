name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  pint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Install dependencies
        run: composer install
      - name: Pint
        run: composer check-style

  phpunit:
    strategy:
      matrix:
        php_version: ['8.3', '8.4', '8.5']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php_version }}
      - name: Install dependencies
        run: composer install
      - name: PHPUnit
        run: ./vendor/bin/phpunit --do-not-fail-on-warning --do-not-fail-on-deprecation
